services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agile
      POSTGRES_PASSWORD: agile
      POSTGRES_DB: agile
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agile:agile@db:5432/agile
      PGHOST: db
      PGUSER: agile
      PGPASSWORD: agile
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
